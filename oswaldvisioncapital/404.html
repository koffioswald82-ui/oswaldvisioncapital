<!DOCTYPE html>

<style>
:root{--ink:#1a1a2e;--gold:#c9832a;--gold-l:#f0a84a;--muted:#8a8aaa;--bg:#fafaf8;--line:#e8e4f0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
.lang-bar{background:var(--ink);padding:.3rem 5vw;font-size:.68rem;color:rgba(255,255,255,.4)}
.lang-bar strong{color:var(--gold-l)}
nav{background:#fff;border-bottom:1px solid var(--line);padding:0 5vw;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 12px rgba(26,26,46,.06)}
.nav-logo{font-family:'Libre Baskerville',serif;font-size:1.05rem;font-weight:700;color:var(--ink);text-decoration:none}
.nav-logo em{color:var(--gold);font-style:italic}
.hero{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:6vh 5vw;background:linear-gradient(135deg,var(--ink) 0%,#2d3561 100%);color:#fff}
.hero-inner{max-width:520px}
.err-code{font-family:'JetBrains Mono',monospace;font-size:6rem;font-weight:700;color:rgba(201,131,42,.2);line-height:1;letter-spacing:-.04em;margin-bottom:.5rem}
.err-title{font-family:'Libre Baskerville',serif;font-size:1.8rem;font-weight:700;margin-bottom:.9rem}
.err-title em{color:var(--gold-l);font-style:italic}
.err-sub{font-size:.9rem;color:rgba(255,255,255,.6);line-height:1.8;margin-bottom:2.5rem}
.err-links{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap}
.err-links a{padding:.5rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;transition:all .2s}
.link-gold{background:var(--gold);color:#fff}
.link-outline{border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7)}
.link-outline:hover{border-color:var(--gold-l);color:var(--gold-l)}
footer{background:var(--ink);color:rgba(255,255,255,.3);padding:1.2rem 5vw;font-size:.72rem;text-align:center}
</style>
</head>
<body>
<div class="lang-bar"><strong>OVC</strong> · Oswald Vision Capital</div>
<nav>
  <a class="nav-logo" href="index.html">Oswald <em>Vision</em> Capital</a>
</nav>
<div class="hero">
  <div class="hero-inner">
    <div class="err-code">404</div>
    <h1 class="err-title">Page <em>introuvable</em></h1>
    <p class="err-sub">Cette page n'existe pas ou a été déplacée.<br>Utilisez les liens ci-dessous pour retrouver votre chemin.</p>
    <div class="err-links">
      <a href="index.html" class="err-links link-gold">← Accueil</a>
      <a href="analyses.html" class="err-links link-outline">Analyses</a>
      <a href="performance.html" class="err-links link-outline">Performance</a>
      <a href="subscribe.html" class="err-links link-outline">Souscrire</a>

</div>
<footer>© 2026 Oswald Vision Capital · Document à caractère informatif uniquement</footer>
